<style>
.stem-wrap-v6 {
  width: 100%;
  font-family: 'Nunito', sans-serif;
  box-sizing: border-box;
  background: #fff;
}
.stem-wrap-v6 * { box-sizing: border-box; margin: 0; padding: 0; }

.stem-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
}

.stem-col {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── ICON PILL ── */
.stem-icon-pill {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 5px 4px 5px 4px;
  width: 100%;
  cursor: default;
  transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.stem-icon-pill:hover {
  transform: translateY(-5px);
}

.stem-icon-pill img {
  width: 28px;
  height: 28px;
  object-fit: contain;
  display: block;
  transition: filter 0.28s ease;
}

.stem-icon-pill:hover img {
  filter: drop-shadow(0 3px 6px rgba(0,0,0,0.22));
}

.stem-icon-name {
  font-family: 'Nunito', sans-serif;
  font-size: 0.52rem;
  font-weight: 900;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  white-space: nowrap;
  transition: letter-spacing 0.28s ease;
}

.stem-icon-pill:hover .stem-icon-name {
  letter-spacing: 0.14em;
}

.stem-col-s .stem-icon-name { color: #6b3fa0; }
.stem-col-t .stem-icon-name { color: #1a5fb4; }
.stem-col-e .stem-icon-name { color: #c0392b; }
.stem-col-m .stem-icon-name { color: #5a8a00; }

/* ── STRIPE — static ── */
.stem-stripe-block {
  height: 7px;
  width: 100%;
}

.stem-col-s .stem-stripe-block { background: #6b3fa0; }
.stem-col-t .stem-stripe-block { background: #1a5fb4; }
.stem-col-e .stem-stripe-block { background: #c0392b; }
.stem-col-m .stem-stripe-block { background: #5a8a00; }

/* ── RESPONSIVE: móvil vertical ── */
@media (max-width: 480px) {
  .stem-icon-pill img {
    width: 22px;
    height: 22px;
  }
  .stem-icon-name {
    font-size: 0.44rem;
    letter-spacing: 0.06em;
  }
  .stem-icon-pill {
    padding: 4px 2px;
    gap: 2px;
  }
}
</style>
